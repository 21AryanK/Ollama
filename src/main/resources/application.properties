spring.application.name=ollama
# Enable ANSI colors
spring.output.ansi.enabled=ALWAYS

# Console Log Pattern
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){cyan} %clr([%thread]){magenta} %clr(%-5level){green} %clr(%logger{36}){yellow} %clr(-){white} %msg%n

# Optional: File Log Pattern (without colors)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Log Levels
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.ai=DEBUG

spring.ai.model.chat=ollama
spring.ai.ollama.chat.model=llama3.2